name: Container Support

on: [push, pull_request]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        cache: [maven]
        distribution: ['zulu']
        java: [21]
        os: [macos-latest, ubuntu-latest, windows-latest]
        token: ["tomcat11", "tomee10", "wildfly40", "liberty26", "jetty12", "glassfish8", "payara7"]
      fail-fast: false
      max-parallel: 6
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}, ${{ matrix.token }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Java ${{ matrix.java }} ${{ matrix.distribution }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          cache: ${{ matrix.cache }}
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.java }}
      - name: Build, start, test, and stop with ${{ matrix.token }}
        shell: bash
        run: |
          echo "Running package..."
          ./mvnw package --batch-mode --no-transfer-progress --show-version -D"enforcer.skip=true" -D"license.skip=true" -DskipTests -P ${{ matrix.token }}

          echo "Starting container forcing output flushing..."
          nohup ./mvnw cargo:run -P ${{ matrix.token }} -Dorg.slf4j.simpleLogger.defaultLogLevel=info > cargo.log 2>&1 &

          # Stream cargo.log to the background job output so you can see boot progress live
          tail -f cargo.log &
          TAIL_PID=$!

          echo "Waiting for server port 8080 to open (up to 240s)..."
          SERVER_READY=false

          for i in $(seq 1 48); do
            sleep 5

            # Target 127.0.0.1 to avoid IPv6 loopback resolution mismatches to jpetstore context path
            if curl -s --max-time 2 http://127.0.0.1:8080/jpetstore/ > /dev/null; then
              echo "Server ready after $((i * 5))s"
              SERVER_READY=true
              break
            fi

            echo "Server not ready yet ($((i * 5))s elapsed)..."
          done
      
          # Kill the background tail process
          kill $TAIL_PID 2>/dev/null || true

          # Kill the background tail process
          kill $TAIL_PID 2>/dev/null || true

          if [ "${SERVER_READY}" != "true" ]; then
            echo "WARNING: server did not respond within time limit; full cargo.log follows:"
            cat cargo.log
            echo "----------------------------"
            exit 1
          fi

          echo "Running integration tests..."
          ./mvnw failsafe:integration-test -P ${{ matrix.token }}

          echo "Verify integration tests..."
          ./mvnw failsafe:verify -P ${{ matrix.token }}

          echo "Stopping container..."
          ./mvnw cargo:stop -P ${{ matrix.token }}
      
      - name: Upload Container Logs on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cargo-logs-${{ matrix.token }}-${{ matrix.os }}
          path: |
            cargo.log
            **/target/cargo/logs/**/*
            **/target/cargo/configurations/**/logs/**/*.log
            **/target/*.log
