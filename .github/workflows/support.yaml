name: Container Support

on: [push, pull_request]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        cache: [maven]
        distribution: ['zulu']
        os: [macos-latest, ubuntu-latest, windows-latest]
        token: ["tomcat9", "tomee80", "wildfly26", "liberty-ee8", "jetty", "payara5", "resin"]
      fail-fast: false
      max-parallel: 6
    name: Test JDK ${{ matrix.token == 'payara5' && '17' || '21' }}, ${{ matrix.os }}, ${{ matrix.token }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Java ${{ matrix.token == 'payara5' && '17' || '21' }} ${{ matrix.distribution }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          cache: ${{ matrix.cache }}
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.token == 'payara5' && '17' || '21' }}
      - name: Build, start, test, and stop with ${{ matrix.token }}
        shell: bash
        run: |
          echo "Running package..."
          ./mvnw package --batch-mode --no-transfer-progress --show-version -D"enforcer.skip=true" -D"license.skip=true" -DskipTests -P ${{ matrix.token }}

          echo "Starting container forcing output flushing..."
          nohup ./mvnw cargo:run -P ${{ matrix.token }} -Dorg.slf4j.simpleLogger.defaultLogLevel=info > cargo.log 2>&1 &

          echo "Waiting for server port 8080 to open (up to 120s)..."
          SERVER_READY=false

          for i in $(seq 1 24); do
            sleep 5

            # Target 127.0.0.1 to avoid IPv6 loopback resolution mismatches to jpetstore context path
            if curl -s --max-time 2 http://127.0.0.1:8080/jpetstore/ > /dev/null; then
              echo "Server ready after $((i * 5))s"
              SERVER_READY=true
              break
            fi

            echo "Server not ready yet ($((i * 5))s elapsed)..."
          done

          if [ "${SERVER_READY}" != "true" ]; then
            echo "WARNING: server did not respond within 120s; cargo.log follows:"
            cat cargo.log
            echo "----------------------------"
            exit 1
          fi

          echo "Running integration tests..."
          ./mvnw failsafe:integration-test -P ${{ matrix.token }}

          echo "Verify integration tests..."
          ./mvnw failsafe:verify -P ${{ matrix.token }}

          echo "Stopping container..."
          ./mvnw cargo:stop -P ${{ matrix.token }}
